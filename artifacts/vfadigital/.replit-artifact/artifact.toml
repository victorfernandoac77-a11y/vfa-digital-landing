kind = "web"
previewPath = "/"
title = "VFADigital - Landing Page"
version = "1.0.0"
id = "artifacts/vfadigital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25555
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/vfadigital run dev"

[services.env]
PORT = "25555"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/vfadigital", "run", "build"]
publicDir = "artifacts/vfadigital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
